<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Taskly">
<meta name="theme-color" content="#FF4D6D">
<title>Taskly ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF4D6D;
    --orange: #FF8C42;
    --yellow: #FFD166;
    --green: #06D6A0;
    --blue: #118AB2;
    --purple: #7B2FBE;
    --bg: #0D0D0D;
    --surface: #1A1A1A;
    --surface2: #242424;
    --surface3: #2E2E2E;
    --text: #F5F5F5;
    --text2: #999;
    --text3: #555;
    --border: rgba(255,255,255,0.07);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  #app { max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; position: relative; }

  /* HEADER */
  .header {
    padding: 56px 20px 16px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .logo span { color: var(--red); }
  .date-pill {
    font-size: 12px; color: var(--text2); background: var(--surface2);
    padding: 6px 12px; border-radius: 20px; font-weight: 500;
  }

  /* ADD BUTTON */
  .btn-add {
    width: 100%; padding: 14px; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--red), var(--orange));
    border: none; color: white; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 4px 20px rgba(255,77,109,0.35);
  }
  .btn-add:active { transform: scale(0.97); opacity: 0.9; }

  /* TABS */
  .tabs {
    display: flex; gap: 4px; padding: 16px 20px 0;
    background: var(--bg);
    position: sticky; top: 130px; z-index: 99;
  }
  .tab {
    flex: 1; padding: 10px 4px; border: none; background: var(--surface2);
    color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: var(--surface3); color: var(--text); font-weight: 600; }
  .tab-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }

  /* MAIN CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }

  /* WEEK VIEW */
  .week-strip { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .week-strip::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
    padding: 10px 12px; border-radius: var(--radius-sm); background: var(--surface);
    cursor: pointer; transition: all 0.2s; min-width: 52px; border: 1.5px solid transparent;
    position: relative;
  }
  .day-pill:active { transform: scale(0.95); }
  .day-pill.today { border-color: var(--red); background: rgba(255,77,109,0.1); }
  .day-pill.selected { background: var(--red); }
  .day-pill.has-tasks::after {
    content: ''; position: absolute; bottom: 5px; width: 4px; height: 4px;
    border-radius: 50%; background: var(--yellow);
  }
  .day-pill.selected.has-tasks::after { background: white; }
  .day-name { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .day-pill.selected .day-name { color: rgba(255,255,255,0.8); }
  .day-num { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  .day-pill.selected .day-num { color: white; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; margin-top: 20px;
  }
  .section-title:first-child { margin-top: 0; }

  /* TASK CARD */
  .task-card {
    background: var(--surface); border-radius: var(--radius);
    margin-bottom: 10px; overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.15s;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .task-card:active { transform: scale(0.99); }

  .task-main { display: flex; align-items: flex-start; gap: 12px; padding: 14px; }
  .task-priority-bar { width: 4px; height: 100%; border-radius: 4px; flex-shrink: 0; min-height: 36px; align-self: stretch; border-radius: 4px; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; word-break: break-word; }
  .task-title.done { text-decoration: line-through; color: var(--text3); }
  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .meta-chip {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    font-weight: 500; display: flex; align-items: center; gap: 4px;
  }
  .chip-time { background: rgba(255,255,255,0.05); color: var(--text2); }
  .chip-recur { background: rgba(17,138,178,0.2); color: #5BC8E8; }
  .chip-note { background: rgba(255,209,102,0.15); color: var(--yellow); }

  .task-actions { display: flex; gap: 6px; align-items: center; }
  .btn-status {
    border: none; cursor: pointer; border-radius: 8px; padding: 6px 10px;
    font-size: 11px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-status:active { transform: scale(0.92); }
  .btn-icon {
    border: none; cursor: pointer; background: var(--surface2); color: var(--text2);
    width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 14px; transition: all 0.15s;
  }
  .btn-icon:active { transform: scale(0.9); }

  /* STATUS COLORS */
  .status-todo { background: rgba(255,255,255,0.05); color: var(--text2); }
  .status-doing { background: rgba(255,140,66,0.2); color: var(--orange); }
  .status-done { background: rgba(6,214,160,0.2); color: var(--green); }

  /* NOTE EXPAND */
  .task-note {
    padding: 0 14px 14px 30px; font-size: 13px; color: var(--text2);
    line-height: 1.5; border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 200; display: flex; align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }
  .overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface); width: 100%; max-width: 430px; margin: 0 auto;
    border-radius: 24px 24px 0 0; padding: 24px 20px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 92dvh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle { width: 40px; height: 4px; background: var(--surface3); border-radius: 4px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 20px; }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; display: block; }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm); padding: 12px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--red); }
  .form-textarea { resize: none; min-height: 80px; line-height: 1.5; }
  .form-select { appearance: none; cursor: pointer; }

  .priority-selector { display: flex; gap: 8px; }
  .priority-btn {
    flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    background: var(--surface2); cursor: pointer; text-align: center;
    font-size: 12px; font-weight: 600; color: var(--text2); transition: all 0.15s;
  }
  .priority-btn.active-high { border-color: var(--red); background: rgba(255,77,109,0.15); color: var(--red); }
  .priority-btn.active-medium { border-color: var(--orange); background: rgba(255,140,66,0.15); color: var(--orange); }
  .priority-btn.active-low { border-color: var(--green); background: rgba(6,214,160,0.15); color: var(--green); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-save {
    width: 100%; padding: 15px; border-radius: var(--radius); border: none;
    background: linear-gradient(135deg, var(--red), var(--orange));
    color: white; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: all 0.15s;
    box-shadow: 0 4px 20px rgba(255,77,109,0.3);
  }
  .btn-save:active { transform: scale(0.97); }

  .btn-cancel {
    width: 100%; padding: 13px; border-radius: var(--radius); border: 1.5px solid var(--border);
    background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
  }

  .btn-delete {
    width: 100%; padding: 13px; border-radius: var(--radius); border: 1.5px solid rgba(255,77,109,0.3);
    background: rgba(255,77,109,0.08); color: var(--red); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; background: rgba(13,13,13,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; padding: 12px 20px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 100; gap: 4px;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px; border-radius: var(--radius-sm); background: transparent; border: none;
    cursor: pointer; color: var(--text3); transition: all 0.2s;
  }
  .nav-btn.active { color: var(--red); background: rgba(255,77,109,0.1); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* NOTIF BANNER */
  .notif-banner {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 13px; z-index: 300; max-width: 380px; width: calc(100% - 40px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideDown 0.3s ease;
    display: flex; align-items: center; gap: 10px;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius-sm); padding: 14px 12px;
    text-align: center; border: 1px solid var(--border);
  }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
  .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* TOGGLE NOTE */
  .toggle-note-btn {
    background: none; border: none; color: var(--yellow); font-size: 12px;
    cursor: pointer; padding: 0 14px 10px; display: block; text-align: left;
    font-family: 'DM Sans', sans-serif;
  }

  /* CALENDAR PAGE */
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
  .cal-header { text-align: center; font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; padding: 4px; }
  .cal-day {
    aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; position: relative;
    background: var(--surface); border: 1.5px solid transparent;
  }
  .cal-day:active { transform: scale(0.9); }
  .cal-day.today { border-color: var(--red); color: var(--red); font-weight: 700; }
  .cal-day.selected { background: var(--red); color: white; }
  .cal-day.other-month { opacity: 0.25; }
  .cal-day.has-tasks::after {
    content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px;
    border-radius: 50%; background: var(--yellow);
  }
  .cal-day.selected.has-tasks::after { background: rgba(255,255,255,0.8); }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .btn-cal-nav { background: var(--surface2); border: none; color: var(--text); width: 36px; height: 36px; border-radius: 10px; cursor: pointer; font-size: 16px; }

  input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===================== STATE =====================
const DAYS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let state = {
  tasks: JSON.parse(localStorage.getItem('taskly_tasks') || '[]'),
  view: 'home', // home | calendar | all
  selectedDate: new Date().toISOString().split('T')[0],
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  modal: null, // null | 'add' | 'edit'
  editingTask: null,
  expandedNotes: new Set(),
  notifBanner: null,
};

function save() {
  localStorage.setItem('taskly_tasks', JSON.stringify(state.tasks));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ===================== REMINDERS =====================
function scheduleReminders() {
  state.tasks.forEach(t => {
    if (t.reminder && t.date && t.status !== 'done') {
      const dt = new Date(`${t.date}T${t.reminder}`);
      const diff = dt - Date.now();
      if (diff > 0 && diff < 86400000 * 2) {
        setTimeout(() => showBanner(`⏰ Rappel : ${t.title}`), diff);
      }
    }
  });
}

function showBanner(msg) {
  state.notifBanner = msg;
  render();
  setTimeout(() => { state.notifBanner = null; render(); }, 4000);
}

// ===================== WEEK STRIP =====================
function getWeekDays(centerDate) {
  const d = new Date(centerDate);
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((day + 6) % 7));
  return Array.from({length: 7}, (_, i) => {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    return dd;
  });
}

// ===================== RENDER =====================
function render() {
  const app = document.getElementById('app');
  const today = new Date().toISOString().split('T')[0];
  const todayFull = new Date();

  // Filter tasks for selected date
  const tasksForDate = (date) => state.tasks.filter(t => {
    if (t.date === date) return true;
    if (t.recur && t.recur !== 'none' && t.date) {
      const start = new Date(t.date);
      const target = new Date(date);
      if (target < start) return false;
      if (t.recur === 'daily') return true;
      if (t.recur === 'weekly') return start.getDay() === target.getDay();
      if (t.recur === 'monthly') return start.getDate() === target.getDate();
    }
    return false;
  });

  const selTasks = tasksForDate(state.selectedDate);
  const weekDays = getWeekDays(state.selectedDate);

  // Stats
  const todo = state.tasks.filter(t => t.status === 'todo').length;
  const doing = state.tasks.filter(t => t.status === 'doing').length;
  const done = state.tasks.filter(t => t.status === 'done').length;

  const priorityColor = { high: '#FF4D6D', medium: '#FF8C42', low: '#06D6A0' };
  const statusLabel = { todo: '📋 À faire', doing: '🔥 En cours', done: '✅ Terminé' };
  const statusClass = { todo: 'status-todo', doing: 'status-doing', done: 'status-done' };
  const recurLabel = { daily: '🔁 Quotidien', weekly: '🔁 Hebdo', monthly: '🔁 Mensuel' };

  function taskCard(t) {
    const hasNote = t.note && t.note.trim();
    const noteExpanded = state.expandedNotes.has(t.id);
    return `
      <div class="task-card" id="card-${t.id}">
        <div class="task-main">
          <div class="task-priority-bar" style="background:${priorityColor[t.priority] || '#555'}"></div>
          <div class="task-body">
            <div class="task-title ${t.status === 'done' ? 'done' : ''}">${esc(t.title)}</div>
            <div class="task-meta">
              ${t.time ? `<span class="meta-chip chip-time">🕐 ${t.time}</span>` : ''}
              ${t.recur && t.recur !== 'none' ? `<span class="meta-chip chip-recur">${recurLabel[t.recur]}</span>` : ''}
              ${hasNote ? `<span class="meta-chip chip-note">📝 Note</span>` : ''}
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-status ${statusClass[t.status]}" onclick="cycleStatus('${t.id}')">${statusLabel[t.status]}</button>
            <button class="btn-icon" onclick="openEdit('${t.id}')">✏️</button>
          </div>
        </div>
        ${hasNote && noteExpanded ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        ${hasNote ? `<button class="toggle-note-btn" onclick="toggleNote('${t.id}')">${noteExpanded ? '▲ Masquer la note' : '▼ Voir la note'}</button>` : ''}
      </div>`;
  }

  function renderHome() {
    const groups = {
      high: selTasks.filter(t => t.priority === 'high'),
      medium: selTasks.filter(t => t.priority === 'medium'),
      low: selTasks.filter(t => t.priority === 'low' || !t.priority),
    };
    let content = `
      <div class="week-strip">
        ${weekDays.map(d => {
          const iso = d.toISOString().split('T')[0];
          const isToday = iso === today;
          const isSelected = iso === state.selectedDate;
          const hasTasks = tasksForDate(iso).length > 0;
          return `<div class="day-pill ${isToday?'today':''} ${isSelected?'selected':''} ${hasTasks?'has-tasks':''}" onclick="selectDate('${iso}')">
            <span class="day-name">${DAYS_FR[d.getDay()]}</span>
            <span class="day-num">${d.getDate()}</span>
          </div>`;
        }).join('')}
      </div>`;

    if (selTasks.length === 0) {
      content += `<div class="empty"><div class="empty-emoji">🎉</div><p>Aucune tâche pour ce jour.<br>Profite ou planifie quelque chose !</p></div>`;
    } else {
      if (groups.high.length) content += `<div class="section-title">🔴 Haute priorité</div>` + groups.high.map(taskCard).join('');
      if (groups.medium.length) content += `<div class="section-title">🟠 Priorité moyenne</div>` + groups.medium.map(taskCard).join('');
      if (groups.low.length) content += `<div class="section-title">🟢 Basse priorité</div>` + groups.low.map(taskCard).join('');
    }
    return content;
  }

  function renderCalendar() {
    const firstDay = new Date(state.calYear, state.calMonth, 1);
    const lastDay = new Date(state.calYear, state.calMonth + 1, 0);
    let startDow = firstDay.getDay();
    startDow = (startDow + 6) % 7; // Monday first

    const cells = [];
    for (let i = 0; i < startDow; i++) {
      const d = new Date(firstDay); d.setDate(d.getDate() - (startDow - i));
      cells.push({ date: d.toISOString().split('T')[0], other: true });
    }
    for (let i = 1; i <= lastDay.getDate(); i++) {
      const d = new Date(state.calYear, state.calMonth, i);
      cells.push({ date: d.toISOString().split('T')[0], other: false });
    }
    const remaining = 42 - cells.length;
    for (let i = 1; i <= remaining; i++) {
      const d = new Date(lastDay); d.setDate(lastDay.getDate() + i);
      cells.push({ date: d.toISOString().split('T')[0], other: true });
    }

    const selTasks2 = tasksForDate(state.selectedDate);

    return `
      <div class="cal-nav">
        <button class="btn-cal-nav" onclick="calPrev()">‹</button>
        <span class="cal-month">${MONTHS_FR[state.calMonth]} ${state.calYear}</span>
        <button class="btn-cal-nav" onclick="calNext()">›</button>
      </div>
      <div class="calendar-grid">
        ${['L','M','M','J','V','S','D'].map(d => `<div class="cal-header">${d}</div>`).join('')}
        ${cells.map(c => {
          const hasTasks = tasksForDate(c.date).length > 0;
          const isToday = c.date === today;
          const isSelected = c.date === state.selectedDate;
          const d = new Date(c.date + 'T12:00:00');
          return `<div class="cal-day ${c.other?'other-month':''} ${isToday?'today':''} ${isSelected?'selected':''} ${hasTasks?'has-tasks':''}" onclick="selectDate('${c.date}')">${d.getDate()}</div>`;
        }).join('')}
      </div>
      <div class="section-title">Tâches — ${formatDateFr(state.selectedDate)}</div>
      ${selTasks2.length === 0 ? `<div class="empty"><div class="empty-emoji">📭</div><p>Aucune tâche ce jour</p></div>` : selTasks2.map(taskCard).join('')}`;
  }

  function renderAll() {
    const all = [...state.tasks].sort((a,b) => (a.date||'').localeCompare(b.date||''));
    const byDate = {};
    all.forEach(t => { const d = t.date || 'Sans date'; if (!byDate[d]) byDate[d] = []; byDate[d].push(t); });
    if (all.length === 0) return `<div class="empty"><div class="empty-emoji">✨</div><p>Aucune tâche pour l'instant.<br>Commence par en créer une !</p></div>`;
    return `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" style="color:var(--text2)">${todo}</div><div class="stat-label">À faire</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${doing}</div><div class="stat-label">En cours</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">Terminé</div></div>
      </div>
      ${Object.entries(byDate).map(([date, tasks]) => `
        <div class="section-title">${date === 'Sans date' ? '📌 Sans date' : '📅 ' + formatDateFr(date)}</div>
        ${tasks.map(taskCard).join('')}
      `).join('')}`;
  }

  // MODAL
  function renderModal() {
    if (!state.modal) return '';
    const t = state.editingTask || { title:'', date: state.selectedDate, time:'', priority:'medium', recur:'none', note:'', reminder:'', status:'todo' };
    return `
      <div class="overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-handle"></div>
          <div class="modal-title">${state.modal === 'edit' ? '✏️ Modifier la tâche' : '✦ Nouvelle tâche'}</div>

          <div class="form-group">
            <label class="form-label">Titre</label>
            <input class="form-input" id="f-title" placeholder="Ex: Appeler le médecin..." value="${esc(t.title)}" autofocus>
          </div>

          <div class="row2">
            <div class="form-group">
              <label class="form-label">Date</label>
              <input class="form-input" type="date" id="f-date" value="${t.date || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">Heure</label>
              <input class="form-input" type="time" id="f-time" value="${t.time || ''}">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Priorité</label>
            <div class="priority-selector">
              <button class="priority-btn ${t.priority==='high'?'active-high':''}" onclick="setPriority('high')">🔴 Haute</button>
              <button class="priority-btn ${t.priority==='medium'?'active-medium':''}" onclick="setPriority('medium')">🟠 Moyenne</button>
              <button class="priority-btn ${t.priority==='low'?'active-low':''}" onclick="setPriority('low')">🟢 Basse</button>
            </div>
          </div>

          <div class="row2">
            <div class="form-group">
              <label class="form-label">Récurrence</label>
              <select class="form-select" id="f-recur">
                <option value="none" ${t.recur==='none'?'selected':''}>Aucune</option>
                <option value="daily" ${t.recur==='daily'?'selected':''}>Quotidienne</option>
                <option value="weekly" ${t.recur==='weekly'?'selected':''}>Hebdomadaire</option>
                <option value="monthly" ${t.recur==='monthly'?'selected':''}>Mensuelle</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Rappel</label>
              <input class="form-input" type="time" id="f-reminder" value="${t.reminder || ''}">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Note</label>
            <textarea class="form-textarea" id="f-note" placeholder="Détails, infos complémentaires...">${esc(t.note || '')}</textarea>
          </div>

          ${state.modal === 'edit' ? `
          <div class="form-group">
            <label class="form-label">Statut</label>
            <select class="form-select" id="f-status">
              <option value="todo" ${t.status==='todo'?'selected':''}>📋 À faire</option>
              <option value="doing" ${t.status==='doing'?'selected':''}>🔥 En cours</option>
              <option value="done" ${t.status==='done'?'selected':''}>✅ Terminé</option>
            </select>
          </div>` : ''}

          <button class="btn-save" onclick="saveTask()">${state.modal === 'edit' ? 'Enregistrer' : '✦ Créer la tâche'}</button>
          ${state.modal === 'edit' ? `<button class="btn-delete" onclick="deleteTask('${t.id}')">🗑 Supprimer</button>` : ''}
          <button class="btn-cancel" onclick="state.modal=null; state.editingTask=null; render()">Annuler</button>
        </div>
      </div>`;
  }

  const todayFormatted = `${DAYS_FR[todayFull.getDay()]} ${todayFull.getDate()} ${MONTHS_FR[todayFull.getMonth()]}`;

  app.innerHTML = `
    ${state.notifBanner ? `<div class="notif-banner">🔔 ${state.notifBanner}</div>` : ''}

    <div class="header">
      <div class="header-top">
        <div class="logo">Task<span>ly</span> ✦</div>
        <div class="date-pill">${todayFormatted}</div>
      </div>
      <button class="btn-add" onclick="state.modal='add'; state.editingTask=null; render()">
        <span style="font-size:18px">+</span> Nouvelle tâche
      </button>
    </div>

    <div class="tabs">
      <button class="tab ${state.view==='home'?'active':''}" onclick="setView('home')">
        <span class="tab-dot" style="background:var(--red)"></span>Aujourd'hui
      </button>
      <button class="tab ${state.view==='calendar'?'active':''}" onclick="setView('calendar')">
        <span class="tab-dot" style="background:var(--blue)"></span>Calendrier
      </button>
      <button class="tab ${state.view==='all'?'active':''}" onclick="setView('all')">
        <span class="tab-dot" style="background:var(--yellow)"></span>Toutes
      </button>
    </div>

    <div class="content" id="content">
      ${state.view === 'home' ? renderHome() : state.view === 'calendar' ? renderCalendar() : renderAll()}
    </div>

    ${renderModal()}
  `;

  // Keep priority button state in modal
  if (state.modal) {
    window._tempPriority = (state.editingTask || {priority:'medium'}).priority || 'medium';
  }
}

// ===================== ACTIONS =====================
let _priority = 'medium';

function setPriority(p) {
  _priority = p;
  const btns = document.querySelectorAll('.priority-btn');
  btns.forEach(b => { b.className = 'priority-btn'; });
  const map = { high: 0, medium: 1, low: 2 };
  if (btns[map[p]]) btns[map[p]].className = `priority-btn active-${p}`;
  if (state.editingTask) state.editingTask.priority = p;
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor = 'var(--red)'; return; }
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const recur = document.getElementById('f-recur').value;
  const note = document.getElementById('f-note').value;
  const reminder = document.getElementById('f-reminder').value;
  const status = state.modal === 'edit' ? document.getElementById('f-status').value : 'todo';
  const priority = _priority;

  if (state.modal === 'edit' && state.editingTask) {
    const idx = state.tasks.findIndex(t => t.id === state.editingTask.id);
    if (idx >= 0) state.tasks[idx] = { ...state.tasks[idx], title, date, time, recur, note, reminder, priority, status };
  } else {
    state.tasks.push({ id: uid(), title, date, time, recur, note, reminder, priority, status });
  }
  save();
  state.modal = null;
  state.editingTask = null;
  scheduleReminders();
  showBanner(`✅ Tâche "${title}" sauvegardée !`);
  render();
}

function openEdit(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  state.editingTask = { ...t };
  _priority = t.priority || 'medium';
  state.modal = 'edit';
  render();
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  save();
  state.modal = null;
  state.editingTask = null;
  render();
}

function cycleStatus(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  const cycle = { todo: 'doing', doing: 'done', done: 'todo' };
  t.status = cycle[t.status];
  save();
  render();
}

function toggleNote(id) {
  if (state.expandedNotes.has(id)) state.expandedNotes.delete(id);
  else state.expandedNotes.add(id);
  render();
}

function selectDate(d) { state.selectedDate = d; render(); }
function setView(v) { state.view = v; render(); }
function calPrev() { if (state.calMonth === 0) { state.calMonth = 11; state.calYear--; } else state.calMonth--; render(); }
function calNext() { if (state.calMonth === 11) { state.calMonth = 0; state.calYear++; } else state.calMonth++; render(); }
function closeModal(e) { if (e.target.classList.contains('overlay')) { state.modal = null; state.editingTask = null; render(); } }

function formatDateFr(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  return `${DAYS_FR[d.getDay()]} ${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===================== NOTIFICATIONS =====================
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ===================== SERVICE WORKER (PWA) =====================
const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => clients.claim());
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
`;
if ('serviceWorker' in navigator) {
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl);
}

// ===================== INIT =====================
_priority = 'medium';
requestNotifPermission();
scheduleReminders();
render();
</script>
</body>
</html>
